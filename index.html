<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jeová Nissi</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./assets/favicon-jeova-nissi.png" type="image/png">
    <link rel="apple-touch-icon" href="./assets/logo-jeova-nissi.jpeg">
</head>
<body class="pagina-login">
    <main class="tela-login">
        <section class="login-hero">
            <img class="logo-login" src="./assets/logo-jeova-nissi-profissional.svg" alt="Logo Jeová Nissi">
            <span>Ministério de Louvor</span>
            <h1>Jeová Nissi</h1>
            <p>O Senhor é a nossa bandeira.</p>
        </section>

        <section class="login-container">
            <h2>Acesse sua área com o seu login</h2>
            <p>Entre para acompanhar repertórios, membros e escalas do ministério.</p>

            <input type="text" placeholder="Coloque aqui seu acesso" aria-label="Usuário de acesso" autocomplete="username">

            <div class="campo-senha">
                <input type="password" id="senha-input" placeholder="Digite sua senha" aria-label="Senha" autocomplete="current-password">
                <button type="button" onclick="toggleSenha()" class="exibir-senha" aria-label="Exibir ou ocultar senha">Exibir</button>
            </div>

            <div class="login-actions">
                <button id="login-btn" type="button">Entrar</button>
                <button id="visitante-btn" type="button">Entrar como visitante</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ministério de Louvor Jeová Nissi. Todos os direitos reservados.</p>
        <div class="footer-socials">
            <p>Dev •</p>
