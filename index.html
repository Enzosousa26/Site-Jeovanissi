<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="tela-login">
        <h2>Ministerio de louvor - JEOVA NISSI</h2>
        <div class="login-container">
            <h2>"O Senhor é a nossa bandeira"</h2>
            <p>Faça login para prosseguir</p>
            <input type="text" placeholder="Coloque aqui seu Acesso">
            <br>
            <div style="position: relative; display: inline-block;">
                <input type="password" id="senha-input" placeholder="Digite sua Senha">
                <span onclick="toggleSenha()" style="
                    position: absolute;
                    right: 10px;
                    top: 50%;
                    transform: translateY(-50%);
                    cursor: pointer;
                    font-size: 9px;
                    user-select: none;
                " class="exibir-senha">Exibir Senha</span>
            </div>
            <br>
            <br>
            <button id="login-btn" onclick="verificarUsuario()">ENTRAR</button>
            
        </div>
    </div>
    <footer>
        <!-- Rodapé da página com aviso de copyright -->
        <p>&copy; 2026 Meu Site Teste. Todos os direitos reservados.</p>
    </footer>
 
    <button id="back-to-top" aria-label="Voltar ao topo">↑</button>
    <!-- Botão que aparece para subir a página para o topo -->
 
    <script src="./script.js"></script>
    <!-- Aqui o JavaScript é carregado para fazer coisas dinâmicas funcionar -->
</body>
</html>
