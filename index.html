<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jeová Nissi</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./favicon-jeova-nissi.svg" type="image/svg+xml">
</head>
<body class="pagina-login">
    <main class="tela-login">
        <section class="login-hero">
            <span>Ministério de Louvor</span>
            <h1>Jeová Nissi</h1>
            <p>O Senhor é a nossa bandeira.</p>
        </section>

        <section class="login-container">
            <h2>Acesse sua área</h2>
            <p>Entre para acompanhar repertórios, membros e escalas do ministério.</p>

            <input type="text" placeholder="Coloque aqui seu acesso">

            <div class="campo-senha">
                <input type="password" id="senha-input" placeholder="Digite sua senha">
                <button type="button" onclick="toggleSenha()" class="exibir-senha">Exibir</button>
            </div>

            <button id="login-btn" type="button">Entrar</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ministério de Louvor Jeová Nissi. Todos os direitos reservados.</p>
    </footer>

    <script src="./script.js"></script>
</body>
</html>
