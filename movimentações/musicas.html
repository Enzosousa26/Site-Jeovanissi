<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Cabeçalho de informações da página sobre -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página sobre nós do Site Teste, com informações sobre a empresa e seus serviços.">
    <title>Repertórios - Jeová Nissi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Puxa a mesma fonte Inter do Google -->
    <link rel="stylesheet" href="../style.css">
    <!-- Usa o mesmo arquivo CSS da página inicial -->
    <link rel="icon" href="../favicon-jeova-nissi.svg" type="image/svg+xml">
    <!-- Ícone do site na aba do navegador -->
</head>
<body>
    <!-- Corpo da página: tudo que aparece para o usuário -->
    <div class="voltar-tela-login">
        <a href="../index.html">Sair da conta</a>
    </div>
 
    <header class="topbar">
        <h4>Perfil: Admin</h4>
        <!-- Cabeçalho do site nesta página -->
        <h1>Repertórios - JEOVA NISSI</h1>
        <nav class="topnav">
            <!-- Links do menu que levam para outras páginas -->
            <a href="../movimentações/home.html" aria-label="Página inicial">Home</a>
            <a href="../movimentações/musicas.html" aria-label="Página de repertórios">Repertórios</a>
            <a href="../movimentações/escalas.html" aria-label="Página de contato">Escalas</a>
        </nav>
    </header>
 
    <main>
        <!-- Conteúdo principal da página sobre -->
        <h2>Repertorio musical</h2>
        <p>Aqui estão todas as musicas do Repertorio</p>
 
        <div class="repertorio-geral" id="repertorio-geral">
            <!-- As listas são geradas pelo JavaScript -->
        </div>
 
        <!-- Botão para admin adicionar nova data (só aparece para admin) -->
        <button class="btn-nova-data somente-admin" id="btn-nova-data" onclick="abrirModalNovaData()" style="display:none;">
            + Adicionar novo repertório
        </button>
    </main>
 
    <!-- Modal para adicionar/editar música -->
    <div class="modal-edicao" id="modal-edicao">
        <div class="conteudo-edicao">
            <button class="fechar-edicao" onclick="fecharModalEdicao()">✕</button>
            <h3 id="modal-titulo">Adicionar música</h3>
            <input type="text" id="input-nome-musica" placeholder="Nome da música e artista">
            <input type="text" id="input-link-musica" placeholder="Link do YouTube (opcional)">
            <button onclick="salvarMusica()">Salvar</button>
        </div>
    </div>
 
    <!-- Modal para nova data -->
    <div class="modal-edicao" id="modal-nova-data">
        <div class="conteudo-edicao">
            <button class="fechar-edicao" onclick="fecharModalNovaData()">✕</button>
            <h3>Nova data do repertório</h3>
            <input type="text" id="input-nova-data" placeholder="Ex: 05/02" maxlength="5" inputmode="numeric">
            <button onclick="salvarNovaData()">Criar lista</button>
        </div>
    </div>
 
    <footer>
        <div class="navegacao-historico" aria-label="Navegação do navegador">
            <button type="button" class="historico-voltar" aria-label="Voltar página">&larr;</button>
            <button type="button" class="historico-avancar" aria-label="Avançar página">&rarr;</button>
        </div>
        <!-- Rodapé reaproveitado em todas as páginas -->
        <p>&copy; 2026 Meu Site Teste. Todos os direitos reservados.</p>
    </footer>
 
    <button id="back-to-top" aria-label="Voltar ao topo">↑</button>
    <!-- Botão usado para voltar ao topo da página -->
 
    <script src="../script.js"></script>
    <!-- Puxa o JavaScript para dar interatividade à página -->
</body>
</html>
